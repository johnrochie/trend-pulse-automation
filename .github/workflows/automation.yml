name: Generate Articles

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    # Needed so the job can commit processed-urls.json back to this repo
    permissions:
      contents: write

    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run article generation pipeline
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TREND_PULSE_TOKEN: ${{ secrets.TREND_PULSE_TOKEN }}
          CATEGORIES: 'technology,business,entertainment,science,health'
          MAX_ARTICLES_PER_CYCLE: '5'
          MAX_TOKENS: '2500'
        run: node index.js

      - name: Commit updated processed-urls.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed-urls.json
          if git diff --cached --quiet; then
            echo "No changes to processed-urls.json"
          else
            git commit -m "chore: update processed URLs [skip ci]"
            git push
          fi
